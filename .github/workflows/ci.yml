name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type Check / Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test
        env:
          SKIP_ENV_VALIDATION: "1"

      - name: Build
        run: pnpm build
        env:
          # Skip env validation — DATABASE_URL is not available in CI by default.
          # Remove this if you add DATABASE_URL to your repository secrets.
          SKIP_ENV_VALIDATION: "1"
